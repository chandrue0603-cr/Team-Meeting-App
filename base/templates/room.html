{% extends 'main.html' %}
{% load static %}
{% block content %}
<div class="room-page">
    <header class="room-header">
        <span id="room-name" style="display:none;"></span>
        <div><strong>ROOM:</strong> <span id="display-room"></span></div>
    </header>

    <main id="video-streams"></main>

    <footer id="controls-wrapper">
        <div class="footer-left">Meeting Details</div>

        <div class="footer-center">
            <div class="icon-wrapper" id="mic-btn-wrapper">
                <img class="control-icon" src="{% static 'images/microphone.svg' %}">
                <div class="diagonal-line"></div>
            </div>
            <div class="icon-wrapper" id="camera-btn-wrapper">
                <img class="control-icon" src="{% static 'images/video.svg' %}">
                <div class="diagonal-line"></div>
            </div>
            <div class="icon-wrapper" id="screen-btn-wrapper" title="Share Screen">
                <img class="control-icon" src="{% static 'images/screen.svg' %}">
            </div>
            <div class="icon-wrapper" id="chat-btn-wrapper" title="Chat">
                <img class="control-icon" src="{% static 'images/chat.svg' %}">
            </div>
            <div class="icon-wrapper" id="leave-btn-wrapper">
                <img class="control-icon" src="{% static 'images/leave.svg' %}" id="leave-btn">
            </div>
        </div>

        <div class="footer-right"></div>
    </footer>
</div>

<script src="{% static 'assets/AgoraRTC_N-4.20.0.js' %}"></script>
<script src="{% static 'js/stream.js' %}?v=1700"></script>
<script>
    const currentRoom = sessionStorage.getItem('room');
    document.getElementById('display-room').innerText = currentRoom || "NEWYEAR";
    document.getElementById('room-name').innerText = currentRoom || "NEWYEAR";
</script>
{% endblock %}
